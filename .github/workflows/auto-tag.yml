name: Auto Tag

on:
  push:
    branches:
      - main

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          echo "latest=${LATEST:-v0.0.0}" >> $GITHUB_OUTPUT

      - name: Determine bump type
        id: bump
        run: |
          LATEST=${{ steps.get_tag.outputs.latest }}
          # Get commits since last tag
          COMMITS=$(git log ${LATEST}..HEAD --pretty=format:"%s")
          echo "Commits since ${LATEST}:"
          echo "$COMMITS"

          if echo "$COMMITS" | grep -qiE '^(feat!|fix!|refactor!|BREAKING CHANGE)'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qiE '^feat(\(.+\))?:'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: version
        run: |
          LATEST=${{ steps.get_tag.outputs.latest }}
          TYPE=${{ steps.bump.outputs.type }}

          # Strip v prefix
          VERSION=${LATEST#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          case $TYPE in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new=${NEW}" >> $GITHUB_OUTPUT
          echo "New version: ${NEW} (${TYPE} bump)"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.new }}
          git push origin ${{ steps.version.outputs.new }}
